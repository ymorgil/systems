site_name: Repositorio de Yeray Moreno
site_url: https://ymorgil.github.io/systems/

theme:
   name: material
   language: es
   logo: assets/favicon.svg
   palette:
      - scheme: default
        primary: deep purple
        accent: indigo
        toggle:
           icon: material/toggle-switch-off-outline
           name: Modo oscuro
      - scheme: slate
        primary: teal
        accent: green
        toggle:
           icon: material/toggle-switch
           name: Modo claro
nav:
   - Inicio: index.md
   - Curso 26/27:
        - Pautas: curso/01Pautas.md
        - Veyon: curso/03Veyon.md
   - ADD: add/index.md
   - BIU: biu/index.md
   - Virtualización:
        - Introducción: virtual/01introducción.md
        - VirtualBox: virtual/02virtualbox.md
        - Proxmox: virtual/03proxmox.md
   - Cloud:
        - Introducción: cloud/01intro.md
        - AWS: cloud/02awsintro.md
        - EC2: cloud/03EC2o.md
   - Contenedores:
        - Introducción: contenedores/00contenedores.md
        - Docker en Windows: curso/01docker-windows.md # aquí explicas WSL dentro
        - Docker en Linux: curso/02docker-linux.md
        - Docker Compose: curso/03docker-compose.md
        - Kubernetes: curso/04kubernetes.md

plugins:
   - glightbox

extra_css:
   - assets/css/extra.css

markdown_extensions:
   - attr_list
