site_name: Repositorio de Yeray Moreno
site_url: https://ymorgil.github.io/systems/

theme:
   name: material
   language: es
   logo: assets/favicon.svg
   palette:
      - scheme: default
        primary: deep purple
        accent: indigo
        toggle:
           icon: material/toggle-switch-off-outline
           name: Modo oscuro
      - scheme: slate
        primary: teal
        accent: green
        toggle:
           icon: material/toggle-switch
           name: Modo claro
nav:
   - Inicio: index.md
   - Curso 26/27:
        - Pautas: curso/01Pautas.md
        - Veyon: curso/03Veyon.md
   - ADD: add/add.md
   - BIU: biu/biu.md
   - Virtualización:
        - Introducción: virtual/01introducción.md
        - VirtualBox: virtual/02virtualbox.md
        - VMware: virtual/03vmware.md
        - Proxmox: virtual/04proxmox.md
   - Cloud:
        - Introducción: cloud/01introcloud.md
        - AWS: cloud/02aws.md
        - EC2: cloud/ec2.md
   - Contenedores:
        - Introducción: contenedores/00contenedores.md
        - Docker en Windows: contenedores/01docker-windows.md # aquí explicas WSL dentro
        - Docker en Linux: contenedores/02docker-linux.md
        - Docker Compose: contenedores/03docker-compose.md
        - Kubernetes: contenedores/04kubernetes.md
   - Scripting:
        - Introducción: scripting/01introducción.md
        - Bash: scripting/02bash.md
        - Python: scripting/03python.md

plugins:
   - glightbox

extra_css:
   - assets/css/extra.css

markdown_extensions:
   - attr_list
   - pymdownx.highlight:
        anchor_linenums: false
        use_pygments: true
   - pymdownx.superfences
   - pymdownx.inlinehilite
